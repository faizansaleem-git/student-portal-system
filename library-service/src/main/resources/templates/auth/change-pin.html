<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change PIN — Library Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>body { background-color: #f8f9fa; }</style>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-header bg-warning text-dark">
                    <h5 class="mb-0">🔐 Change Your PIN</h5>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted">You must set a new PIN before using the Library Portal.</p>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/change-pin}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Current PIN</label>
                            <input type="password" class="form-control" name="oldPin"
                                   placeholder="Enter current PIN (000000 if first login)" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">New PIN</label>
                            <input type="password" class="form-control" name="newPin"
                                   placeholder="Enter new PIN" required minlength="4">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirm New PIN</label>
                            <input type="password" class="form-control" name="confirmPin"
                                   placeholder="Repeat new PIN" required minlength="4">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Set New PIN</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
