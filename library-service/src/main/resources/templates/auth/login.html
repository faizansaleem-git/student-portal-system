<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Portal — Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #e3f2fd; display: flex; align-items: center; min-height: 100vh; }
        .card { box-shadow: 0 4px 16px rgba(0,0,0,.12); }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="text-center mb-4">
                <h1 class="h3">📚 Library Portal</h1>
                <p class="text-muted">Student Portal System — Leeds Beckett University</p>
            </div>
            <div class="card">
                <div class="card-body p-4">
                    <h5 class="card-title mb-4">Sign In</h5>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <div th:if="${param.session}" class="alert alert-warning">
                        Your session expired. Please sign in again.
                    </div>
                    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
                    <div th:if="${param.pinChanged}" class="alert alert-success">
                        PIN changed successfully. Please sign in with your new PIN.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Student ID</label>
                            <input type="text" class="form-control" id="username" name="username"
                                   placeholder="e.g. STU-00001 or admin" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">PIN</label>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="6-digit PIN" required maxlength="20">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Sign In</button>
                    </form>
                </div>
            </div>
            <p class="text-center text-muted mt-3 small">
                Default student PIN: <code>000000</code> (you will be asked to change it on first login)
            </p>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Remove ?error / ?logout / ?pinChanged from URL after displaying the message,
    // so a page reload returns to a clean /login rather than re-showing the alert.
    if (window.location.search) {
        history.replaceState(null, '', window.location.pathname);
    }
</script>
</body>
</html>
