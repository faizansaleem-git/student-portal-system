<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book — Library Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>body{background:#f8f9fa;}</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/admin/dashboard">📚 Library Admin</a>
        <a href="/admin/dashboard" class="btn btn-outline-light btn-sm">← Back to Dashboard</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card">
                <div class="card-header"><strong>Add Book by ISBN</strong></div>
                <div class="card-body">
                    <p class="text-muted small">
                        Title and author are fetched automatically from the
                        <strong>Open Library API</strong> using the ISBN you provide.
                    </p>
                    <form th:action="@{/admin/books/add}" method="post">
                        <div class="mb-3">
                            <label class="form-label">ISBN (13 digits)</label>
                            <input type="text" class="form-control font-monospace" name="isbn"
                                   placeholder="e.g. 9780132350884" required maxlength="20"
                                   pattern="[0-9]{10,13}">
                            <div class="form-text">Enter the 13-digit ISBN from the book's barcode.</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Number of Copies</label>
                            <input type="number" class="form-control" name="copies"
                                   value="3" min="1" max="20" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            Fetch from Open Library &amp; Add
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="mt-5 py-3 bg-light border-top text-center text-muted small">
    Library Microservice &nbsp;|&nbsp; Student Portal System &nbsp;|&nbsp; Leeds Beckett University
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
