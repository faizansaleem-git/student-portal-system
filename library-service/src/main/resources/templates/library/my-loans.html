<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Loans — Library Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>body{background:#f8f9fa;}</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/dashboard">📚 Library Portal</a>
        <div class="d-flex align-items-center gap-3">
            <a href="/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
            <a href="/books" class="btn btn-outline-light btn-sm">Browse Books</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button class="btn btn-light btn-sm" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">My Loan History</h2>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-primary">
                <tr>
                    <th>Book</th><th>Author</th><th>Borrowed</th><th>Returned</th>
                    <th>Status</th><th>Fine</th><th>Invoice Ref</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="loan : ${loans}">
                    <td th:text="${loan.book.title}"></td>
                    <td th:text="${loan.book.author}"></td>
                    <td th:text="${#temporals.format(loan.borrowedAt,'dd MMM yyyy')}"></td>
                    <td th:text="${loan.returnedAt != null ? #temporals.format(loan.returnedAt,'dd MMM yyyy') : '—'}"></td>
                    <td>
                        <span th:if="${loan.returnedAt == null}" class="badge bg-primary">Active</span>
                        <span th:if="${loan.returnedAt != null and !loan.overdue}" class="badge bg-success">Returned</span>
                        <span th:if="${loan.returnedAt != null and loan.overdue}" class="badge bg-danger">Overdue</span>
                    </td>
                    <td th:text="${loan.fineAmount != null ? '£' + loan.fineAmount : '—'}"></td>
                    <td class="font-monospace small"
                        th:text="${loan.invoiceReference != null ? loan.invoiceReference : '—'}"></td>
                </tr>
                <tr th:if="${loans.isEmpty()}">
                    <td colspan="7" class="text-center text-muted py-3">No loan history.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer class="mt-5 py-3 bg-light border-top text-center text-muted small">
    Library Microservice &nbsp;|&nbsp; Student Portal System &nbsp;|&nbsp; Leeds Beckett University
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
