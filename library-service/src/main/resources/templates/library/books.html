<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Books — Library Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>body{background:#f8f9fa;} .card{box-shadow:0 2px 8px rgba(0,0,0,.08);}</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/dashboard">📚 Library Portal</a>
        <div class="d-flex align-items-center gap-3">
            <a href="/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
            <a href="/my-loans" class="btn btn-outline-light btn-sm">My Loans</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button class="btn btn-light btn-sm" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Book Catalogue</h2>
    </div>

    <!-- Search -->
    <form th:action="@{/books}" method="get" class="mb-4">
        <div class="input-group">
            <input type="text" class="form-control" name="search"
                   placeholder="Search by title or author…" th:value="${search}">
            <button class="btn btn-primary" type="submit">Search</button>
            <a href="/books" class="btn btn-outline-secondary">Clear</a>
        </div>
    </form>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-success">
                <tr>
                    <th>Title</th><th>Author</th><th>ISBN</th>
                    <th class="text-center">Available</th><th class="text-center">Total</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="book : ${books}">
                    <td th:text="${book.title}"></td>
                    <td th:text="${book.author}"></td>
                    <td class="font-monospace small" th:text="${book.isbn}"></td>
                    <td class="text-center">
                        <span th:class="${book.availableCopies > 0 ? 'badge bg-success' : 'badge bg-danger'}"
                              th:text="${book.availableCopies}"></span>
                    </td>
                    <td class="text-center" th:text="${book.totalCopies}"></td>
                    <td>
                        <form th:if="${book.availableCopies > 0}"
                              th:action="@{/borrow/{isbn}(isbn=${book.isbn})}" method="post">
                            <button class="btn btn-sm btn-primary">Borrow</button>
                        </form>
                        <span th:if="${book.availableCopies == 0}" class="text-muted small">Unavailable</span>
                    </td>
                </tr>
                <tr th:if="${books.isEmpty()}">
                    <td colspan="6" class="text-center text-muted py-3">No books found.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer class="mt-5 py-3 bg-light border-top text-center text-muted small">
    Library Microservice &nbsp;|&nbsp; Student Portal System &nbsp;|&nbsp; Leeds Beckett University
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
