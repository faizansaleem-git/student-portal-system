spring.application.name=library-service

# ── Server ──────────────────────────────────────────────────────────────────
server.port=8083

# ── DataSource (MySQL) ───────────────────────────────────────────────────────
spring.datasource.url=${LIBRARY_DB_URL:jdbc:mysql://localhost:3308/librarydb?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${LIBRARY_DB_USER:root}
spring.datasource.password=${LIBRARY_DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── Thymeleaf ────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false

# Unique session cookie name — prevents conflict with Student Portal (also on localhost)
server.servlet.session.cookie.name=LIBRARY_SESSION

# ── Finance service URL (for posting library fines) ──────────────────────────
finance.service.url=${FINANCE_SERVICE_URL:http://localhost:8082}

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.university=INFO
