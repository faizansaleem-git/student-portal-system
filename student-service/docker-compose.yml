# Student Service standalone docker-compose
# Starts: student-mysql + student-service
# Finance and Library services must be running separately for full integration.
# For the full system, use the root-level docker-compose.yml.

services:

  student-mysql:
    image: mysql:8.0
    container_name: student-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: studentdb
    ports:
      - "3307:3306"
    volumes:
      - student-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  student-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student-service
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      STUDENT_DB_URL: jdbc:mysql://student-mysql:3306/studentdb?createDatabaseIfNotExist=true&serverTimezone=UTC
      STUDENT_DB_USER: root
      STUDENT_DB_PASSWORD: root
      FINANCE_SERVICE_URL: http://host.docker.internal:8082
      LIBRARY_SERVICE_URL: http://host.docker.internal:8083
      FINANCE_PORTAL_URL: http://localhost:8082
      LIBRARY_PORTAL_URL: http://localhost:8083
    depends_on:
      student-mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  student-mysql-data:
