<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Student Portal — Edit Profile</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">Student Portal</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/courses}">Browse Courses</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/enrolments}">My Enrolments</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/profile}">Profile</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/enrolments/graduation}">Graduation</a></li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <h2 class="fw-bold mb-4">Edit Profile</h2>

            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form th:action="@{/profile/edit}" th:object="${profileUpdateRequest}" method="post">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">First Name</label>
                                <input type="text" th:field="*{firstName}" class="form-control"
                                       th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'" required/>
                                <div class="invalid-feedback" th:errors="*{firstName}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Last Name</label>
                                <input type="text" th:field="*{lastName}" class="form-control"
                                       th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'" required/>
                                <div class="invalid-feedback" th:errors="*{lastName}"></div>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Email Address</label>
                                <input type="email" th:field="*{email}" class="form-control"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" required/>
                                <div class="invalid-feedback" th:errors="*{email}"></div>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Programme</label>
                                <input type="text" th:field="*{programme}" class="form-control"
                                       placeholder="e.g. BSc Computer Science"/>
                            </div>
                        </div>
                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                            <a th:href="@{/profile}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
