<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Student Portal — Register</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h2 class="card-title text-center mb-1 fw-bold text-primary">Create Account</h2>
                    <p class="text-center text-muted mb-4">Leeds Beckett University — Student Portal</p>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/register}" th:object="${registerRequest}" method="post">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">First Name</label>
                                <input type="text" th:field="*{firstName}" class="form-control"
                                       th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'" required/>
                                <div class="invalid-feedback" th:errors="*{firstName}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Last Name</label>
                                <input type="text" th:field="*{lastName}" class="form-control"
                                       th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'" required/>
                                <div class="invalid-feedback" th:errors="*{lastName}"></div>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Username</label>
                                <input type="text" th:field="*{username}" class="form-control"
                                       th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'" required/>
                                <div class="invalid-feedback" th:errors="*{username}"></div>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Password</label>
                                <input type="password" th:field="*{password}" class="form-control"
                                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'" required/>
                                <div class="invalid-feedback" th:errors="*{password}"></div>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Email Address</label>
                                <input type="email" th:field="*{email}" class="form-control"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" required/>
                                <div class="invalid-feedback" th:errors="*{email}"></div>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Programme <span class="text-muted">(optional)</span></label>
                                <input type="text" th:field="*{programme}" class="form-control"
                                       placeholder="e.g. MSc Computer Science"/>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mt-4">Register</button>
                    </form>

                    <hr/>
                    <p class="text-center mb-0">Already have an account? <a th:href="@{/login}">Log in</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
