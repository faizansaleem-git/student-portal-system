server.port=8080

# Database
spring.datasource.url=${STUDENT_DB_URL:jdbc:mysql://localhost:3307/studentdb?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${STUDENT_DB_USER:root}
spring.datasource.password=${STUDENT_DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Thymeleaf
spring.thymeleaf.cache=false

# Unique session cookie name — prevents conflict with Library Portal (also on localhost)
server.servlet.session.cookie.name=STUDENT_SESSION

# External services — API base URLs (used for service-to-service REST calls)
finance.service.url=${FINANCE_SERVICE_URL:http://localhost:8082}
library.service.url=${LIBRARY_SERVICE_URL:http://localhost:8083}

# Portal URLs shown to the browser (always localhost — the user's machine)
finance.portal.url=${FINANCE_PORTAL_URL:http://localhost:8082}
library.portal.url=${LIBRARY_PORTAL_URL:http://localhost:8083}
